<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Docs</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prismjs@1/plugins/line-numbers/prism-line-numbers.min.css">
  <style>
    :root {
      --theme-color: #0f766e;
      --topbar-height: 60px;
      --layout-shell-max-width: 1300px;
      --layout-shell-gutter: 1rem;
      --layout-sidebar-width: 300px;
      --layout-shell-side-gap: max(var(--layout-shell-gutter), calc((100vw - var(--layout-shell-max-width)) / 2));
      --ui-bg: #f5f8fb;
      --ui-surface: #ffffff;
      --ui-text: #132337;
      --ui-text-soft: #4b5d75;
      --ui-border: #d7e3f2;
      --ui-shadow: 0 18px 36px rgba(8, 24, 55, 0.09);
      --focus-ring: rgba(20, 184, 166, 0.36);
      --sidebar-bg: linear-gradient(180deg, #f9fcff 0%, #f0f6fd 100%);
      --sidebar-hover-bg: rgba(15, 118, 110, 0.09);
      --sidebar-active-bg: rgba(15, 118, 110, 0.14);
      --sidebar-active-text: #0b5d56;
      --topbar-bg: rgba(245, 248, 251, 0.84);
      --selection-bg: rgba(20, 184, 166, 0.26);
      --selection-text: #062f2b;
      --search-bg: #ffffff;
      --code-bg: #0b1328;
      --code-bg-soft: #111c37;
      --code-border: #223354;
      --code-text: #e7efff;
      --inline-code-bg: #e8f7f5;
      --inline-code-text: #0f766e;
      --code-lang-bg: rgba(15, 23, 42, 0.35);
      --code-lang-border: rgba(148, 163, 184, 0.25);
      --code-lang-text: #9db0d4;
      --code-line-number: #7589b1;
      --code-token-comment: #7f91b6;
      --code-token-keyword: #7ab3ff;
      --code-token-string: #97f1b6;
      --code-token-function: #ffd17d;
      --code-token-number: #ffb2a6;
      --code-token-operator: #d2ddf5;
    }

    html[data-ui-theme="dark"] {
      --theme-color: #1cc7b5;
      --ui-bg: #0a1324;
      --ui-surface: #0f1b31;
      --ui-text: #d9e7ff;
      --ui-text-soft: #9eb4d7;
      --ui-border: #1e3357;
      --ui-shadow: 0 20px 38px rgba(1, 7, 18, 0.42);
      --focus-ring: rgba(45, 212, 191, 0.44);
      --sidebar-bg: linear-gradient(180deg, #0f1c35 0%, #0b152a 100%);
      --sidebar-hover-bg: rgba(45, 212, 191, 0.1);
      --sidebar-active-bg: rgba(45, 212, 191, 0.16);
      --sidebar-active-text: #92fff3;
      --topbar-bg: rgba(10, 19, 36, 0.84);
      --selection-bg: rgba(45, 212, 191, 0.34);
      --selection-text: #031313;
      --search-bg: #0d1a2f;
      --inline-code-bg: rgba(45, 212, 191, 0.15);
      --inline-code-text: #8ff8ee;
    }

    html[data-code-theme="light"] {
      --code-bg: #f8fbff;
      --code-bg-soft: #ffffff;
      --code-border: #d7e3f5;
      --code-text: #16253f;
      --code-lang-bg: rgba(15, 118, 110, 0.08);
      --code-lang-border: rgba(15, 118, 110, 0.18);
      --code-lang-text: #0f766e;
      --code-line-number: #7c8ca9;
      --code-token-comment: #64748b;
      --code-token-keyword: #2563eb;
      --code-token-string: #047857;
      --code-token-function: #b45309;
      --code-token-number: #be123c;
      --code-token-operator: #1e293b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    html {
      scroll-padding-top: calc(var(--topbar-height) + 6px);
    }

    body {
      background: var(--ui-bg);
      color: var(--ui-text);
      font-family: "Manrope", "Segoe UI", sans-serif;
      line-height: 1.72;
      margin: 0;
      padding-top: 0;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.24s ease, color 0.24s ease;
    }

    ::selection {
      background: var(--selection-bg);
      color: var(--selection-text);
    }

    *::-webkit-scrollbar {
      height: 10px;
      width: 10px;
    }

    *::-webkit-scrollbar-thumb {
      background: rgba(92, 122, 161, 0.55);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    *::-webkit-scrollbar-track {
      background: transparent;
    }

    a:focus-visible,
    button:focus-visible,
    input:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .docs-topbar {
      backdrop-filter: blur(14px);
      background: var(--topbar-bg);
      border-bottom: 1px solid var(--ui-border);
      left: 0;
      overflow: visible;
      position: fixed;
      right: 0;
      top: 0;
      width: 100%;
      z-index: 80;
    }

    .docs-topbar__inner {
      align-items: center;
      display: flex;
      gap: 1rem;
      height: 60px;
      justify-content: space-between;
      margin: 0 auto;
      max-width: var(--layout-shell-max-width);
      overflow: visible;
      padding: 0 1rem;
      width: 100%;
    }

    .docs-topbar__brand-group {
      align-items: center;
      display: inline-flex;
      gap: 0.55rem;
      min-width: 0;
    }

    .docs-topbar__menu-toggle {
      align-items: center;
      background: color-mix(in srgb, var(--ui-surface) 88%, var(--theme-color) 12%);
      border: 1px solid var(--ui-border);
      border-radius: 10px;
      color: var(--ui-text);
      cursor: pointer;
      display: inline-flex;
      height: 2.2rem;
      flex-shrink: 0;
      justify-content: center;
      padding: 0;
      transition: border-color 0.16s ease, background-color 0.16s ease, transform 0.16s ease;
      width: 2.2rem;
    }

    .docs-topbar__menu-toggle:hover {
      background: color-mix(in srgb, var(--ui-surface) 78%, var(--theme-color) 22%);
      border-color: rgba(20, 184, 166, 0.42);
      transform: translateY(-1px);
    }

    .docs-topbar__menu-toggle:active {
      transform: translateY(0);
    }

    .docs-topbar__menu-toggle span {
      background: var(--ui-text);
      border-radius: 999px;
      display: block;
      height: 2px;
      width: 15px;
    }

    .docs-topbar__menu-toggle .bar-mid {
      width: 11px;
    }

    .docs-topbar__menu-toggle-inner {
      align-items: center;
      display: flex;
      flex-direction: column;
      gap: 3px;
      justify-content: center;
    }

    .docs-topbar__search-slot {
      flex: 1;
      margin: 0 0.45rem;
      max-width: 540px;
      min-width: 180px;
      overflow: visible;
    }

    .docs-topbar__search-slot .search {
      border-bottom: 0;
      margin: 0;
      padding: 0;
      position: relative;
      width: 100%;
    }

    .docs-topbar__search-slot .search input {
      background: var(--search-bg);
      border: 1px solid var(--ui-border);
      border-radius: 999px;
      color: var(--ui-text);
      font-family: "Manrope", "Segoe UI", sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.52rem 2.7rem 0.52rem 0.85rem;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
      width: 100%;
    }

    .docs-topbar__search-slot .search input::placeholder {
      color: color-mix(in srgb, var(--ui-text-soft) 85%, transparent);
    }

    .docs-topbar__search-slot .search input:focus {
      border-color: rgba(20, 184, 166, 0.46);
      box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.16);
      outline: 0;
    }

    .docs-topbar__search-slot .search .results-panel {
      background: var(--ui-surface);
      border: 1px solid var(--ui-border);
      border-radius: 12px;
      box-shadow: var(--ui-shadow);
      left: 0;
      margin-top: 0;
      max-height: 62vh;
      overflow-y: auto;
      padding: 0.35rem 0;
      position: absolute;
      right: 0;
      top: calc(100% + 0.45rem);
      width: 100%;
      z-index: 120;
    }

    .docs-topbar__search-slot .search .matching-post {
      border-bottom: 1px solid var(--ui-border);
      margin: 0;
      padding: 0.45rem 0.72rem;
    }

    .docs-topbar__search-slot .search .matching-post:last-child {
      border-bottom: 0;
    }

    .docs-topbar__search-slot .search .matching-post a {
      color: var(--ui-text);
      font-size: 0.86rem;
      text-decoration: none;
    }

    .docs-topbar__search-slot .search .matching-post p {
      color: var(--ui-text-soft);
      margin: 0.28rem 0 0;
    }

    .docs-topbar__search-slot .search .clear-button {
      align-items: center;
      background: color-mix(in srgb, var(--ui-surface) 86%, var(--theme-color) 14%);
      border: 1px solid var(--ui-border);
      border-radius: 999px;
      color: var(--ui-text-soft);
      display: none !important;
      font-size: 0.9rem;
      font-weight: 800;
      height: 1.5rem;
      justify-content: center;
      line-height: 1;
      padding: 0;
      pointer-events: none;
      position: absolute !important;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 1.5rem;
      z-index: 2;
    }

    .docs-topbar__search-slot .search.has-value .clear-button {
      display: inline-flex !important;
      pointer-events: auto;
    }

    .docs-topbar__search-slot .search .clear-button:hover {
      background: color-mix(in srgb, var(--ui-surface) 76%, var(--theme-color) 24%);
      color: var(--ui-text);
    }

    .docs-topbar__brand {
      align-items: center;
      color: var(--ui-text);
      display: inline-flex;
      font-family: "Space Grotesk", "Manrope", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      gap: 0.55rem;
      letter-spacing: 0.01em;
      text-decoration: none;
    }

    .docs-topbar__brand:hover {
      color: var(--theme-color);
      text-decoration: none;
    }

    .docs-topbar__dot {
      background: radial-gradient(circle at 35% 35%, #2dd4bf 0%, #0f766e 75%);
      border-radius: 999px;
      box-shadow: 0 0 0 6px rgba(20, 184, 166, 0.13);
      height: 10px;
      width: 10px;
    }

    .docs-topbar__actions {
      align-items: center;
      display: flex;
      gap: 0.5rem;
    }

    .theme-toggle {
      background: var(--ui-surface);
      border: 1px solid var(--ui-border);
      border-radius: 999px;
      color: var(--ui-text);
      cursor: pointer;
      font-family: "Manrope", "Segoe UI", sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.025em;
      line-height: 1.1;
      min-width: 84px;
      padding: 0.38rem 0.7rem;
      transition: transform 0.16s ease, border-color 0.16s ease, background-color 0.16s ease;
    }

    .theme-toggle:hover {
      background: var(--sidebar-hover-bg);
      border-color: rgba(20, 184, 166, 0.34);
      transform: translateY(-1px);
    }

    .theme-toggle:active {
      transform: translateY(0);
    }

    .sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--ui-border);
      box-shadow: 8px 0 24px rgba(15, 23, 42, 0.08);
      height: calc(100vh - var(--topbar-height));
      top: var(--topbar-height);
      transition: background 0.24s ease, border-color 0.24s ease;
    }

    .sidebar .app-name {
      display: none;
    }

    .sidebar-nav {
      padding: 0.2rem 0.72rem 1.1rem;
    }

    .sidebar ul li {
      margin: 0.2rem 0;
    }

    .sidebar ul li a {
      border-radius: 10px;
      color: var(--ui-text-soft);
      display: block;
      font-size: 0.93rem;
      font-weight: 600;
      line-height: 1.35;
      padding: 0.34rem 0.68rem;
      transition: background-color 0.16s ease, color 0.16s ease;
    }

    .sidebar ul li a:hover {
      background: var(--sidebar-hover-bg);
      color: var(--ui-text);
      text-decoration: none;
    }

    .sidebar ul li.active > a {
      background: transparent;
      border-right: 0;
      color: var(--ui-text-soft);
      font-weight: 600;
    }

    .sidebar ul li > a.is-current {
      background: var(--sidebar-active-bg);
      color: var(--sidebar-active-text);
      font-weight: 700;
    }

    .sidebar-nav li > p {
      color: var(--ui-text);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin: 1rem 0 0.45rem;
      padding: 0 0.68rem;
      text-transform: uppercase;
    }

    .search {
      margin: 0.8rem 0.72rem 0.9rem;
      padding: 0;
    }

    .search input {
      background: var(--search-bg);
      border: 1px solid var(--ui-border);
      border-radius: 10px;
      color: var(--ui-text);
      font-family: "Manrope", "Segoe UI", sans-serif;
      font-size: 0.89rem;
      font-weight: 500;
      padding: 0.62rem 0.75rem;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .search input::placeholder {
      color: color-mix(in srgb, var(--ui-text-soft) 85%, transparent);
    }

    .search input:focus {
      border-color: rgba(20, 184, 166, 0.46);
      box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.16);
      outline: 0;
    }

    .content {
      background: var(--ui-bg);
      min-height: calc(100vh - var(--topbar-height));
      scroll-padding-top: calc(var(--topbar-height) + 6px);
      transition: background-color 0.24s ease;
    }

    .markdown-section {
      color: var(--ui-text);
      font-size: 16px;
      line-height: 1.8;
      margin: 0 auto;
      max-width: 920px;
      padding: 2rem 2.3rem 3.4rem;
    }

    .markdown-section h1[id],
    .markdown-section h2[id],
    .markdown-section h3[id],
    .markdown-section h4[id],
    .markdown-section h5[id],
    .markdown-section h6[id] {
      scroll-margin-top: calc(var(--topbar-height) + 6px);
    }

    .markdown-section > * {
      opacity: 1;
      transform: translateY(0);
    }

    .markdown-section.route-enter > * {
      animation: route-enter 0.48s cubic-bezier(0.2, 0.85, 0.2, 1) both;
      opacity: 0;
      transform: translateY(10px);
    }

    .markdown-section.route-enter > *:nth-child(1) { animation-delay: 0.02s; }
    .markdown-section.route-enter > *:nth-child(2) { animation-delay: 0.04s; }
    .markdown-section.route-enter > *:nth-child(3) { animation-delay: 0.06s; }
    .markdown-section.route-enter > *:nth-child(4) { animation-delay: 0.08s; }
    .markdown-section.route-enter > *:nth-child(5) { animation-delay: 0.1s; }
    .markdown-section.route-enter > *:nth-child(6) { animation-delay: 0.12s; }
    .markdown-section.route-enter > *:nth-child(7) { animation-delay: 0.14s; }
    .markdown-section.route-enter > *:nth-child(8) { animation-delay: 0.16s; }
    .markdown-section.route-enter > *:nth-child(9) { animation-delay: 0.18s; }
    .markdown-section.route-enter > *:nth-child(10) { animation-delay: 0.2s; }

    @keyframes route-enter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      color: var(--ui-text);
      font-family: "Space Grotesk", "Manrope", sans-serif;
      letter-spacing: -0.012em;
      line-height: 1.26;
      margin-top: 1.5em;
    }

    .markdown-section h1 {
      font-size: clamp(1.7rem, 2.4vw, 2.2rem);
      margin-top: 0.24em;
    }

    .markdown-section h2 {
      border-bottom: 1px solid var(--ui-border);
      font-size: clamp(1.33rem, 1.8vw, 1.58rem);
      padding-bottom: 0.35rem;
    }

    .markdown-section h3 {
      font-size: clamp(1.11rem, 1.5vw, 1.28rem);
    }

    .markdown-section p,
    .markdown-section li {
      color: var(--ui-text-soft);
      font-size: 1rem;
    }

    .markdown-section strong {
      color: var(--ui-text);
    }

    .markdown-section a {
      color: var(--theme-color);
      font-weight: 700;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 3px;
    }

    .markdown-section a:hover {
      color: color-mix(in srgb, var(--theme-color) 83%, #ffffff 17%);
    }

    .markdown-section blockquote {
      background: color-mix(in srgb, var(--ui-surface) 90%, var(--theme-color) 10%);
      border-left: 4px solid var(--theme-color);
      border-radius: 10px;
      color: var(--ui-text);
      margin: 1.05rem 0;
      padding: 0.8rem 1rem;
    }

    .markdown-section hr {
      background: linear-gradient(90deg, transparent 0%, var(--ui-border) 20%, var(--ui-border) 80%, transparent 100%);
      border: 0;
      height: 1px;
      margin: 2.2rem 0;
    }

    .markdown-section table {
      background: var(--ui-surface);
      border: 1px solid var(--ui-border);
      border-collapse: separate;
      border-radius: 12px;
      border-spacing: 0;
      box-shadow: var(--ui-shadow);
      display: block;
      margin: 1.1rem 0;
      max-width: 100%;
      overflow-x: auto;
      white-space: nowrap;
    }

    .markdown-section table th,
    .markdown-section table td {
      border-bottom: 1px solid var(--ui-border);
      border-right: 1px solid var(--ui-border);
      color: var(--ui-text-soft);
      padding: 0.6rem 0.8rem;
    }

    .markdown-section table th:last-child,
    .markdown-section table td:last-child {
      border-right: 0;
    }

    .markdown-section table tr:last-child td {
      border-bottom: 0;
    }

    .markdown-section table th {
      background: color-mix(in srgb, var(--ui-surface) 85%, var(--theme-color) 15%);
      color: var(--ui-text);
      font-weight: 700;
    }

    .markdown-section img {
      border: 1px solid var(--ui-border);
      border-radius: 12px;
      box-shadow: var(--ui-shadow);
      margin: 0.8rem 0;
      max-width: 100%;
    }

    .markdown-section pre {
      background: linear-gradient(180deg, var(--code-bg-soft) 0%, var(--code-bg) 100%);
      border: 1px solid var(--code-border);
      border-radius: 12px;
      box-shadow: 0 12px 28px rgba(2, 8, 23, 0.2);
      color: var(--code-text);
      margin: 1.1em 0;
      overflow: auto;
      padding: 2.2rem 1rem 1rem;
    }

    .markdown-section pre code {
      background: transparent;
      border-radius: 0;
      color: inherit;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "Consolas", "Courier New", monospace;
      font-size: 0.9rem;
      line-height: 1.65;
      padding: 0;
      text-shadow: none;
    }

    .markdown-section code {
      background: var(--inline-code-bg);
      border-radius: 6px;
      color: var(--inline-code-text);
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "Consolas", "Courier New", monospace;
      padding: 0.12em 0.38em;
    }

    .markdown-section pre[data-lang]::after {
      background: var(--code-lang-bg);
      border: 1px solid var(--code-lang-border);
      border-radius: 999px;
      color: var(--code-lang-text);
      font-size: 0.63rem;
      letter-spacing: 0.08em;
      padding: 0.12rem 0.5rem;
      right: 4.9rem;
      text-transform: uppercase;
      top: 0.55rem;
    }

    .markdown-section pre.line-numbers {
      padding-left: 3.9rem;
    }

    .markdown-section pre.line-numbers .line-numbers-rows {
      border-right: 1px solid var(--code-border);
      left: 0;
      top: 2.2rem;
      width: 2.85rem;
    }

    .markdown-section pre.line-numbers .line-numbers-rows > span:before {
      color: var(--code-line-number);
      font-size: 0.8rem;
      line-height: 1.65;
    }

    .docsify-copy-code-button {
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
      border: 0;
      border-radius: 999px;
      box-shadow: 0 6px 14px rgba(15, 118, 110, 0.3);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 0.32rem 0.72rem;
      top: 0.48rem;
      transition: transform 0.16s ease, filter 0.16s ease;
    }

    .docsify-copy-code-button:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
    }

    .docsify-copy-code-button:active {
      transform: translateY(0);
    }

    .docsify-copy-code-button.success {
      background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%);
    }

    .docsify-copy-code-button.error {
      background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
    }

    .markdown-section pre .token.comment,
    .markdown-section pre .token.prolog,
    .markdown-section pre .token.doctype,
    .markdown-section pre .token.cdata {
      color: var(--code-token-comment);
    }

    .markdown-section pre .token.keyword,
    .markdown-section pre .token.selector,
    .markdown-section pre .token.atrule {
      color: var(--code-token-keyword);
    }

    .markdown-section pre .token.string,
    .markdown-section pre .token.attr-value {
      color: var(--code-token-string);
    }

    .markdown-section pre .token.function,
    .markdown-section pre .token.class-name {
      color: var(--code-token-function);
    }

    .markdown-section pre .token.number,

      if (!normalized) {

      }
      if (normalized.endsWith("\n")) {

      }
      return normalized ? normalized.split("\n").length : 0;
    }

    function applyLineNumbers(container) {
      if (!container) {
        return;
      }

      var codeBlocks = container.querySelectorAll("pre > code");

      var forceScrollTop = function () {
        try {
          window.scrollTo(0, 0);
        } catch (error) {
          window.scrollTop = 0;
        }

        if (contentScroller && typeof contentScroller.scrollTop === "number") {
          try {
            if (typeof contentScroller.scrollTo === "function") {
              contentScroller.scrollTo({ top: 0, behavior: "auto" });
            } else {
              contentScroller.scrollTop = 0;
            }
          } catch (innerError) {
            contentScroller.scrollTop = 0;
          }
        }
      };

      forceScrollTop();
      window.setTimeout(forceScrollTop, 80);
      window.setTimeout(forceScrollTop, 220);
    }

    function safeDecodeHashValue(value) {
      try {
        return decodeURIComponent(value);
      } catch (error) {
        return value;
      }
    }

    function extractAnchorIdFromHashLike(hashLike) {
      if (!hashLike) {
        return "";
      }

      var hash = hashLike;
      var hashStart = hash.indexOf("#");
      if (hashStart > -1) {
        hash = hash.slice(hashStart);
      }

      if (hash.charAt(0) !== "#") {
        return "";
      }

      var rawHash = hash.slice(1);
      if (!rawHash) {
        return "";
      }

      var queryIndex = rawHash.indexOf("?");
      if (queryIndex !== -1) {
        var params = new URLSearchParams(rawHash.slice(queryIndex + 1));
        var queryId = params.get("id");
        if (queryId) {
          return safeDecodeHashValue(queryId);
        }
      }

      var nestedHashIndex = rawHash.lastIndexOf("#");
      if (nestedHashIndex > -1 && nestedHashIndex < rawHash.length - 1) {
        return safeDecodeHashValue(rawHash.slice(nestedHashIndex + 1));
      }

      if (rawHash.charAt(0) !== "/" && rawHash.charAt(0) !== "?") {
        return safeDecodeHashValue(rawHash);
      }

      return "";
    }

    function getCurrentHashAnchorId() {
      return extractAnchorIdFromHashLike(window.location.hash || "");
    }

    function normalizeRoutePath(path) {
      var normalized = (path || "").trim();
      if (!normalized) {
        return "/";
      }
      if (normalized.charAt(0) !== "/") {
        return "/";
      }
      if (normalized.length > 1) {
        normalized = normalized.replace(/\/+$/, "");
      }
      return normalized || "/";
    }

    function extractRoutePathFromHashLike(hashLike) {
      if (!hashLike) {
        return "";
      }

      var source = String(hashLike);
      var hashIndex = source.indexOf("#");
      var hashPart = hashIndex > -1 ? source.slice(hashIndex + 1) : source;
      if (!hashPart) {
        return "/";
      }
      if (hashPart.charAt(0) !== "/") {
        return "";
      }

      var queryIndex = hashPart.indexOf("?");
      if (queryIndex !== -1) {
        hashPart = hashPart.slice(0, queryIndex);
      }

      var nestedHashIndex = hashPart.indexOf("#");
      if (nestedHashIndex !== -1) {
        hashPart = hashPart.slice(0, nestedHashIndex);
      }

      return normalizeRoutePath(safeDecodeHashValue(hashPart));
    }

    function getCurrentRoutePath() {
      return extractRoutePathFromHashLike(window.location.hash || "") || "/";
    }

    function syncSidebarActiveLink(options) {
      var allowRouteFallbackWhenAnchorMissing = !!(
        options && options.allowRouteFallbackWhenAnchorMissing
      );
      var sidebarNav = document.querySelector(".sidebar-nav");
      if (!sidebarNav) {
        return false;
      }

      var links = Array.from(sidebarNav.querySelectorAll("a[href]"));
      if (!links.length) {
        return false;
      }

      var currentPath = getCurrentRoutePath();
      var currentAnchorId = getCurrentHashAnchorId();
      var exactAnchorMatchedLink = null;
      var routeOnlyMatchedLink = null;
      var hasAnyAnchorLinksForCurrentPath = false;

      links.forEach(function (link) {
        link.classList.remove("is-current");

        var linkHref = link.getAttribute("href") || "";
        var linkPath = extractRoutePathFromHashLike(linkHref);
        var linkAnchorId = extractAnchorIdFromHashLike(linkHref);
        var isSameRoute = !!linkPath ? linkPath === currentPath : !!linkAnchorId;
        if (!isSameRoute) {
          return;
        }

        if (linkAnchorId) {
          hasAnyAnchorLinksForCurrentPath = true;
        }

        if (currentAnchorId && linkAnchorId && linkAnchorId === currentAnchorId) {
          if (!exactAnchorMatchedLink) {
            exactAnchorMatchedLink = link;
          }
          return;
        }

        if (!routeOnlyMatchedLink && !linkAnchorId) {
          routeOnlyMatchedLink = link;
        }
      });

      var matchedLink = null;
      if (currentAnchorId) {
        if (exactAnchorMatchedLink) {
          matchedLink = exactAnchorMatchedLink;
        } else if (allowRouteFallbackWhenAnchorMissing || hasAnyAnchorLinksForCurrentPath) {
          matchedLink = routeOnlyMatchedLink;
        } else {
          return false;
        }
      } else {
        matchedLink = routeOnlyMatchedLink;
      }

      if (!matchedLink && currentAnchorId) {
        links.some(function (link) {
          var linkPath = extractRoutePathFromHashLike(link.getAttribute("href") || "");
          if (linkPath && linkPath === currentPath) {
            matchedLink = link;
            return true;
          }
          return false;
        });
      }

      if (matchedLink) {
        matchedLink.classList.add("is-current");
      }

      return true;
    }

    function scheduleSidebarActiveSync(retries) {
      var remaining = typeof retries === "number" ? retries : 8;
      if (syncSidebarActiveLink()) {
        return;
      }
      if (remaining <= 0) {
        syncSidebarActiveLink({ allowRouteFallbackWhenAnchorMissing: true });
        return;
      }
      window.setTimeout(function () {
        scheduleSidebarActiveSync(remaining - 1);
      }, 70);
    }

    function findAnchorElement(anchorId) {
      if (!anchorId) {
        return null;
      }

      var byId = document.getElementById(anchorId);
      if (byId) {
        return byId;
      }

      var escaped = anchorId.replace(/\\/g, "\\\\").replace(/"/g, '\\"');
      return document.querySelector('[name="' + escaped + '"]');
    }

    function adjustAnchorForTopbar(anchorIdOverride, options) {
      var anchorId = anchorIdOverride || getCurrentHashAnchorId();
      if (!anchorId) {
        return;
      }

      var anchorElement = findAnchorElement(anchorId);
      if (!anchorElement) {
        return;
      }

      var topbarHeight = parseFloat(
        getComputedStyle(document.documentElement).getPropertyValue("--topbar-height")
      ) || 0;
      var scrollContainer = getScrollableAncestor(anchorElement);
      var anchorRect = anchorElement.getBoundingClientRect();

      var behavior = options && options.behavior;

      if (scrollContainer) {
        var containerRect = scrollContainer.getBoundingClientRect();
        var desiredTop = containerRect.top + ANCHOR_OFFSET_EXTRA;
        var deltaInContainer = anchorRect.top - desiredTop;
        if (Math.abs(deltaInContainer) <= 1) {
          return;
        }
        var targetScrollTop = scrollContainer.scrollTop + deltaInContainer;
        var maxScrollTop = Math.max(0, scrollContainer.scrollHeight - scrollContainer.clientHeight);
        var clampedScrollTop = Math.min(maxScrollTop, Math.max(0, Math.round(targetScrollTop)));
        if (Math.abs(scrollContainer.scrollTop - clampedScrollTop) > 1) {
          if (behavior && typeof scrollContainer.scrollTo === "function") {
            scrollContainer.scrollTo({ top: clampedScrollTop, behavior: behavior });
          } else {
            scrollContainer.scrollTop = clampedScrollTop;
          }
        }
        return;
      }

      var desiredWindowTop = topbarHeight + ANCHOR_OFFSET_EXTRA;
      var deltaInWindow = anchorRect.top - desiredWindowTop;
      if (Math.abs(deltaInWindow) <= 1) {
        return;
      }

      var targetWindowTop = window.pageYOffset + deltaInWindow;
      var clampedWindowTop = Math.max(0, Math.round(targetWindowTop));
      if (Math.abs(window.pageYOffset - clampedWindowTop) > 1) {
        if (behavior) {
          window.scrollTo({ top: clampedWindowTop, behavior: behavior });
        } else {
          window.scrollTo(0, clampedWindowTop);
        }
      }
    }

    function scheduleAnchorAdjustment(anchorIdOverride, options) {
      var firstOptions = options && options.behavior ? { behavior: options.behavior } : null;
      var run = function (runOptions) {
        window.requestAnimationFrame(function () {
          adjustAnchorForTopbar(anchorIdOverride, runOptions);
        });
      };

      run(firstOptions);

      window.setTimeout(function () { run(); }, 120);
      window.setTimeout(function () { run(); }, 360);
      window.setTimeout(function () { run(); }, 760);
    }

    function isPlainLeftClick(event) {
      if (!event) {
        return true;
      }
      if (event.defaultPrevented) {
        return false;
      }
      if (typeof event.button === "number" && event.button !== 0) {
        return false;
      }
      if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
        return false;
      }
      return true;
    }

    function buildHashForInPageAnchor(href, anchorId) {
      var rawHash = "";
      if (href) {
        var hashIndex = href.indexOf("#");
        if (hashIndex !== -1) {
          rawHash = href.slice(hashIndex);
        }
      }

      if (!rawHash && anchorId) {
        rawHash = "#" + anchorId;
      }

      if (!rawHash) {
        return "";
      }

      if (rawHash.charAt(0) !== "#") {
        rawHash = "#" + rawHash;
      }

      if (rawHash.charAt(1) === "/") {
        return rawHash;
      }

      var currentRoute = getCurrentRoutePath() || "/";
      if (rawHash.indexOf("#?") === 0) {
        return "#" + currentRoute + rawHash.slice(1);
      }

      return "#" + currentRoute + rawHash;
    }

    function buildHashForRouteWithoutAnchor(href, routePathOverride) {
      var routePath = routePathOverride || extractRoutePathFromHashLike(href) || getCurrentRoutePath() || "/";
      if (!routePath || routePath.charAt(0) !== "/") {
        routePath = "/" + (routePath || "");
      }
      if (routePath.length > 1) {
        routePath = routePath.replace(/\/+$/, "");
      }
      return "#" + routePath;
    }

    function isSameOriginLink(anchorLink) {
      if (!anchorLink || !anchorLink.href) {
        return true;
      }
      try {
        var linkUrl = new URL(anchorLink.href, window.location.href);
        return linkUrl.origin === window.location.origin;
      } catch (error) {
        return true;
      }
    }

    function initializeAnchorInteractions() {
      if (document.body.dataset.anchorOffsetBound === "true") {
        return;
      }

      document.body.addEventListener("click", function (event) {
        var anchorLink = event.target.closest('a[href*="#"]');
        if (!anchorLink) {
          return;
        }

        var href = anchorLink.getAttribute("href") || "";
        var clickedAnchorId = extractAnchorIdFromHashLike(href);
        var linkPath = extractRoutePathFromHashLike(href);
        var currentPath = getCurrentRoutePath();
        var isContentLink = !!anchorLink.closest(".content");
        var isSidebarLink = !!anchorLink.closest(".sidebar");
        var shouldHandleInlineAnchor =
          (isContentLink || isSidebarLink) &&
          isPlainLeftClick(event) &&
          isSameOriginLink(anchorLink) &&
          !anchorLink.hasAttribute("download") &&
          (!anchorLink.target || anchorLink.target === "_self") &&
          !!clickedAnchorId &&
          (!linkPath || linkPath === currentPath);

        if (shouldHandleInlineAnchor) {
          event.preventDefault();
          event.stopPropagation();

          var nextHash = buildHashForInPageAnchor(href, clickedAnchorId);
          if (nextHash) {
            try {
              window.history.pushState(null, "", nextHash);
            } catch (error) {
              window.location.hash = nextHash;
            }
          }

          scheduleSidebarActiveSync(12);
          bindBackToTopScrollTarget();
          updateBackToTopVisibility();
          scheduleAnchorAdjustment(clickedAnchorId, { behavior: "smooth" });
          return;
        }

        var shouldHandleSameRouteTop =
          isSidebarLink &&
          isPlainLeftClick(event) &&
          isSameOriginLink(anchorLink) &&
          !anchorLink.hasAttribute("download") &&
          (!anchorLink.target || anchorLink.target === "_self") &&
          !clickedAnchorId &&
          !!linkPath &&
          linkPath === currentPath;

        if (shouldHandleSameRouteTop) {
          event.preventDefault();
          event.stopPropagation();

          var nextRouteHash = buildHashForRouteWithoutAnchor(href, linkPath);
          if (nextRouteHash) {
            try {
              window.history.pushState(null, "", nextRouteHash);
            } catch (error) {
              window.location.hash = nextRouteHash;
            }
          }

          resetScrollForRouteWithoutAnchor();
          scheduleSidebarActiveSync(12);
          bindBackToTopScrollTarget();
          updateBackToTopVisibility();
          return;
        }

        window.setTimeout(function () {
          scheduleAnchorAdjustment(clickedAnchorId);
        }, 16);
      }, true);

      document.body.dataset.anchorOffsetBound = "true";
    }

    function stripLeadingFrontMatter(markdownContent) {
      if (typeof markdownContent !== "string" || markdownContent.length === 0) {
        return markdownContent;
      }

      var normalized = markdownContent.replace(/^\uFEFF/, "");
      var frontMatterMatch = normalized.match(
        /^---[ \t]*\r?\n[\s\S]*?\r?\n---(?:[ \t]*\r?\n|[ \t]*$)/
      );

      if (!frontMatterMatch) {
        return normalized;
      }

      return normalized.slice(frontMatterMatch[0].length);
    }

    var initialUiTheme = getInitialUiTheme();
    applyUiTheme(initialUiTheme);
    applyCodeTheme(getInitialCodeTheme(initialUiTheme === "dark" ? "dark" : "light"));

    window.$docsify = {
      name: "Project Docs",
      homepage: "readme.md",
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: false,
      relativePath: true,
      notFoundPage: "_404.md",
      copyCode: {
        buttonText: "Copy",
        errorText: "Error",
        successText: "Copied"
      },
      search: {
        placeholder: "Search docs",
        noData: "No results",
        depth: 3
      },
      plugins: [
        function (hook) {
          hook.beforeEach(function (markdown) {
            return stripLeadingFrontMatter(markdown);
          });

          hook.ready(function () {
            initializeGoogleAnalytics();
            initializeThemeToggles();
            relocateSearchToTopbar(20);
            initializeTopbarSidebarToggle(20);
            initializeMobileSidebarInteractions();
            initializeSearchInteractions();
            initializeAnchorInteractions();
            initializeBackToTopButton();
            scheduleSidebarActiveSync(12);
            updateTopbarHeightVariable();
            updateBackToTopVisibility();
            trackAnalyticsPageView();
            scheduleAnchorAdjustment();
          });

          hook.doneEach(function () {
            var appRoot = document.querySelector("#app");
            initializeGoogleAnalytics();
            initializeThemeToggles();
            decorateDocs(appRoot);
            relocateSearchToTopbar(20);
            initializeTopbarSidebarToggle(20);
            initializeMobileSidebarInteractions();
            initializeSearchInteractions();
            initializeAnchorInteractions();
            initializeBackToTopButton();
            scheduleSidebarActiveSync(12);
            updateTopbarHeightVariable();
            resetScrollForRouteWithoutAnchor();
            updateBackToTopVisibility();
            trackAnalyticsPageView();
            scheduleAnchorAdjustment();
          });
        }
      ]
    };
  </script>

  <script>
    if (window.Prism && window.Prism.languages && window.Prism.languages.apacheconf) {
      window.Prism.languages.apache = window.Prism.languages.apacheconf;
    }

    window.addEventListener("load", function () {
      var appRoot = document.querySelector("#app");
      initializeGoogleAnalytics();
      initializeThemeToggles();
      decorateDocs(appRoot);
      relocateSearchToTopbar(20);
      initializeTopbarSidebarToggle(20);
      initializeMobileSidebarInteractions();
      initializeSearchInteractions();

      trackAnalyticsPageView();
      scheduleAnchorAdjustment();
    });

    window.addEventListener("resize", function () {
      updateTopbarHeightVariable();
      if (!isMobileViewport()) {
        closeMobileSidebar();
      }
      bindBackToTopScrollTarget();
      updateBackToTopVisibility();
      scheduleAnchorAdjustment();
    });

    window.addEventListener("hashchange", function () {
      if (isMobileViewport()) {
        closeMobileSidebar();
      }
      scheduleSidebarActiveSync(12);
      bindBackToTopScrollTarget();
      updateBackToTopVisibility();
      trackAnalyticsPageView();
      scheduleAnchorAdjustment();
    });
  </script>
